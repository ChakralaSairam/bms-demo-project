version: "3.9"

# Docker Compose — like running two Spring Boot apps side-by-side,
# but containerized and on the same virtual network so they can talk to each other.
#
# Java equivalent mental model:
#   - Each "service" block = one running JAR/container
#   - "networks" = a shared LAN where containers find each other by service name
#   - "ports" = like server.port in application.properties, exposed to your machine

services:

  # ── Redis Cache ─────────────────────────────────────────────────────────────
  # Like adding spring-boot-starter-data-redis + a Redis server to your stack.
  # Inside Docker Compose, other containers reach it via hostname "bms-redis".
  bms-redis:
    image: redis:latest
    container_name: bms-redis
    ports:
      - "6379:6379"                  # expose to host for local redis-cli access
    networks:
      - app-network

  # ── Go Inventory Service (Days 2–7) ────────────────────────────────────────
  inventory-service:
    build:
      context: ./inventory-service   # path to the directory with the Dockerfile
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8081:8081"                  # host:container — access via localhost:8081
    networks:
      - app-network
    depends_on:
      - bms-redis                    # like Spring Boot waiting for Redis to be ready
    environment:
      - GIN_MODE=release             # like spring.profiles.active=prod
      - REDIS_ADDR=bms-redis:6379    # service name resolves inside Docker network
      - SHOW_SERVICE_URL=http://192.168.1.6:8082

  # ── Java User Service (Days 1 + 3) — uncomment when ready ─────────────────
  # user-service:
  #   build:
  #     context: ./user-service
  #     dockerfile: Dockerfile
  #   container_name: user-service
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - app-network
  #   environment:
  #     - SPRING_PROFILES_ACTIVE=docker

# ── Shared Bridge Network ────────────────────────────────────────────────────
# Both services join "app-network" so they can reach each other by service name.
# e.g., inside a container: http://inventory-service:8081/health
# Like: two Spring Boot apps on the same internal LAN.
networks:
  app-network:
    driver: bridge
